<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    AgroOrbitz Login
  </title>

  <link
    rel="stylesheet"
    href="style.css"
  >

</head>

<body
  style="
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:#0b1220;
  "
>

  <div
    class="card"
    style="
      width:400px;
      max-width:90%;
    "
  >

    <div class="card-head">

      <h2>
        Farmer Login
      </h2>

      <span class="chip chip-emerald">
        Secure
      </span>

    </div>

    <div class="input-grid">

      <div class="input-item">

        <label>
          Email
        </label>

        <input
          type="email"
          id="login-email"
          placeholder="Enter email"
        >

      </div>

      <div class="input-item">

        <label>
          Password
        </label>

        <input
          type="password"
          id="login-password"
          placeholder="Enter password"
        >

      </div>

    </div>

    <button
      id="btn-login"
      class="btn btn-primary"
      style="margin-top:20px;width:100%;"
    >
      Login
    </button>

    <button
      id="btn-signup"
      class="btn"
      style="
        margin-top:12px;
        width:100%;
      "
    >
      Create Account
    </button>

  </div>

  <script>

    const loginBtn =
      document.getElementById(
        "btn-login"
      );

    const signupBtn =
      document.getElementById(
        "btn-signup"
      );

    signupBtn.addEventListener(
      "click",
      () => {

        const email =
          document.getElementById(
            "login-email"
          ).value;

        const password =
          document.getElementById(
            "login-password"
          ).value;

        if(
          !email ||
          !password
        ){

          alert(
            "Fill all fields"
          );

          return;
        }

        localStorage.setItem(
          "agro_user",
          JSON.stringify({
            email,
            password
          })
        );

        alert(
          "Account created successfully"
        );
      }
    );

    loginBtn.addEventListener(
      "click",
      () => {

        const email =
          document.getElementById(
            "login-email"
          ).value;

        const password =
          document.getElementById(
            "login-password"
          ).value;

        const user =
          JSON.parse(
            localStorage.getItem(
              "agro_user"
            )
          );

        if(
          !user
        ){

          alert(
            "No account found"
          );

          return;
        }

        if(
          email === user.email &&
          password === user.password
        ){

          localStorage.setItem(
            "agro_logged_in",
            "true"
          );

          window.location.href =
            "index.html";
        }

        else{

          alert(
            "Invalid credentials"
          );
        }
      }
    );

  </script>

</body>
</html>
